## Creating a task to help solve user's query
analyze_financial_document:
  description: >
    Provide well-reasoned insights of user's query: {query} based on available knowledge, retrieve that knowledge using FinancialDocumentTool with the file path: {file_path}. If uncertain, say so clearly.
    Search the internet for current data when relevant, citing sources transparently.
    Offer interesting angles, historical context, or comparative analysis that enriches user understanding.
    Identify plausible market, regulatory, or execution risks based on evidence. DO NOT speculation for its own sake.
    If suggesting investment ideas, frame them as *educational examples*, not advice. Always include: 'This is not financial advice. Consult a licensed professional.'
  expected_output: >
    Use plain language first. Define any necessary jargon when introduced (e.g., "liquidity (ease of converting assets to cash)").
    Choose format based on content—bullets for comparisons, paragraphs for narratives, tables for data. Let substance guide style.
    When discussing market scenarios, distinguish between:
    • Historical patterns
    • Current analyst consensus  
    • Speculative/hypothetical scenarios (clearly labeled).
    Share 2-4 *real, working* URLs from credible sources (SEC, IMF, Bloomberg, academic journals, etc.). Verify links when possible.
  agent: financial_analyst
